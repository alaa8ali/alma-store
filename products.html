<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>منتجاتنا - Alma</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f9ff;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: #2563eb;
    }

    .filter-buttons {
      margin-bottom: 20px;
    }

    .filter-btn {
      background-color: #e0f0ff;
      border: none;
      border-radius: 20px;
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    .filter-btn:hover, .filter-btn.active {
      background-color: #2563eb;
      color: white;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .product {
      background-color: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .product img {
      max-width: 100%;
      border-radius: 10px;
    }

    .product h3 {
      margin: 10px 0 5px;
    }

    .product p {
      color: #444;
    }

    .add-btn {
      background-color: #25D366;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    .search-bar {
      padding: 10px;
      width: 80%;
      max-width: 400px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      background-color: #f3f4f6;
      color: #2563eb;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .back-link:hover {
      background-color: #2563eb;
      color: white;
    }
  </style>
</head>
<body>

  <h1>🛍️ جميع المنتجات</h1>

  <!-- شريط البحث -->
  <input type="text" id="searchInput" class="search-bar" placeholder="🔍 ابحث عن منتج..." oninput="searchProducts()">
  <br>

  <!-- زر العودة -->
  <a href="index.html" class="back-link">⬅️ العودة إلى الرئيسية</a>

  <!-- أزرار التصنيفات -->
  <div class="filter-buttons">
    <button class="filter-btn active" onclick="filterProducts('all')">الكل</button>
    <button class="filter-btn" onclick="filterProducts('بسكويت')">بسكويت</button>
    <button class="filter-btn" onclick="filterProducts('معلبات')">معلبات</button>
    <button class="filter-btn" onclick="filterProducts('أجبان')">أجبان</button>
    <button class="filter-btn" onclick="filterProducts('بوظة')">بوظة</button>
  </div>

  <!-- عرض المنتجات -->
  <div class="products" id="product-list"></div>

  <!-- سكربت جافاسكربت -->
  <script>
    const products = [
      { name: "سنيكرز", price: 5500, category: "بسكويت", image: "https://via.placeholder.com/200x150?text=Snickers" },
      { name: "مارس", price: 6500, category: "بسكويت", image: "https://via.placeholder.com/200x150?text=Mars" },
      { name: "شوكو برينس", price: 6500, category: "بسكويت", image: "https://via.placeholder.com/200x150?text=Choco+Prince" },
      { name: "جبنة موزاريلا", price: 12000, category: "أجبان", image: "https://via.placeholder.com/200x150?text=Mozzarella" },
      { name: "تونة صن شاين", price: 8000, category: "معلبات", image: "https://via.placeholder.com/200x150?text=Tuna" }
    ];

    let currentFilter = "all";

    function renderProducts(list) {
      const container = document.getElementById("product-list");
      container.innerHTML = "";

      list.forEach(product => {
        const card = document.createElement("div");
        card.className = "product";
        card.innerHTML = `
          <img src="${product.image}" alt="${product.name}">
          <h3>${product.name}</h3>
          <p>السعر: ${product.price} ل.س</p>
          <button class="add-btn" onclick="addToCart('${product.name}', ${product.price})">أضف إلى السلة</button>
        `;
        container.appendChild(card);
      });
    }

    function filterProducts(category) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      currentFilter = category;
      const filtered = category === "all" ? products : products.filter(p => p.category === category);
      renderProducts(filtered);
    }

    function searchProducts() {
      const input = document.getElementById("searchInput").value.toLowerCase();
      const filtered = products.filter(p => {
        const matchesName = p.name.toLowerCase().includes(input);
        const matchesCategory = currentFilter === "all" || p.category === currentFilter;
        return matchesName && matchesCategory;
      });
      renderProducts(filtered);
    }

    function addToCart(name, price) {
      const cart = JSON.parse(localStorage.getItem("cart") || "[]");
      cart.push({ name, price });
      localStorage.setItem("cart", JSON.stringify(cart));
      alert(`✅ تمت إضافة ${name} إلى السلة`);
    }

    // عرض المنتجات عند تحميل الصفحة
    renderProducts(products);
  </script>

</body>
</html>
