<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alma - متجر إلكتروني</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f0f8ff;
      margin: 0;
      padding: 0;
    }
    header {
      background: #e0f7fa;
      color: #01579b;
      text-align: center;
      padding: 20px;
      font-size: 2em;
      font-weight: bold;
    }
    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      background: #b3e5fc;
      padding: 10px;
    }
    nav button {
      padding: 10px 15px;
      border: none;
      background: #0288d1;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    nav button:hover {
      background: #01579b;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .product {
      background: white;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 0 10px #ccc;
    }
    .product img {
      width: 100%;
      height: auto;
      border-radius: 5px;
    }
    .cart-container {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: white;
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 10px;
      width: 280px;
      max-height: 400px;
      overflow-y: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      z-index: 999;
    }
    .cart-container h4 {
      margin-top: 0;
    }
    .cart-items {
      font-size: 14px;
      margin-bottom: 10px;
    }
    .cart-container button {
      width: 100%;
      background: #388e3c;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<header>Alma - متجر إلكتروني</header>

<nav>
  <button onclick="filterProducts('all')">الكل</button>
  <button onclick="filterProducts('مشروبات')">مشروبات</button>
  <button onclick="filterProducts('حلويات متنوعة')">حلويات متنوعة</button>
  <button onclick="filterProducts('بسكويت')">بسكويت</button>
  <button onclick="filterProducts('بقالة أساسية')">بقالة أساسية</button>
  <button onclick="filterProducts('منظفات وعناية شخصية')">منظفات</button>
  <button onclick="filterProducts('أخرى/متفرقات')">متفرقات</button>
</nav>

<section class="products" id="products">
  <!-- هنا سيتم إدخال جميع المنتجات من خلال سكربت جافاسكريبت -->
</section>

<div class="cart-container" id="cart">
  <h4>🛒 السلة</h4>
  <div class="cart-items" id="cartItems">لا توجد عناصر.</div>
  <div><strong>الإجمالي: </strong><span id="totalPrice">0</span> ل.س</div>
  <button onclick="sendOrder()">أرسل الطلب على واتساب</button>
</div>

<script>
  const products = [
    {name: "مرغريتا سمن نباتي 2كغ", price: 55000, category: "أخرى/متفرقات"},
    {name: "سيتي كافيه 3 ب 1 كريمي ظرف 19.8 غ", price: 2500, category: "أخرى/متفرقات"},
    {name: "سيتي كافيه 2 ب 1 ظرف 10 غ", price: 1750, category: "أخرى/متفرقات"},
    {name: "كابتشينو فارتيكا  ظرف 18غ", price: 2500, category: "أخرى/متفرقات"},
    {name: "سيتي كافيه  زجاج سريعة التحضير 80غ", price: 33000, category: "أخرى/متفرقات"},
    {name: "بامبي تو جوز الهند21غ", price: 1500, category: "أخرى/متفرقات"},
    {name: "نستله سيريلاك كرتون 125 غ", price: 12600, category: "أخرى/متفرقات"},
    {name: "باستا زارا فيتوتشيني كيس 500 غ رقم 205", price: 35175, category: "أخرى/متفرقات"},
    {name: "اولي معكرونة اشكال كيس 400 غ", price: 4200, category: "أخرى/متفرقات"},
    {name: "باريلا معكرونة اشكال كرتون 500 غ", price: 2, category: "أخرى/متفرقات"},
    {name: "باريلا معكرونة اشكال كرتون 500 غ ملونة", price: 27825, category: "أخرى/متفرقات"},
    {name: "نستله نيسكافيه غولد زجاج 190 غ روسي", price: 70875, category: "أخرى/متفرقات"},
    {name: "تورا بكا كراميلو لاتيه ظرف 25 غ", price: 3150, category: "أخرى/متفرقات"},
    {name: "نستله نيسكافيه 3 ب 1 كلاسيك ظرف 20 غ امارات", price: 2625, category: "أخرى/متفرقات"},
    {name: "نستله نيسكافيه 3 ب 1 اكسترا اسود ظرف 16.5 غ تركي", price: 2625, category: "أخرى/متفرقات"},
    {name: "نستله نيسكافيه 3 ب 1 اورجينال احمر ظرف 17.5 غ تركي", price: 2625, category: "أخرى/متفرقات"},
    {name: "نستله نيسكافيه 3 ب 1 كريمي غولد ظرف 17.4 غ تركي", price: 2625, category: "أخرى/متفرقات"},
    {name: "نستله نيسكافيه 2 ب 1 دايت ظرف 11.7 غ امارات", price: 2625, category: "أخرى/متفرقات"},
    {name: "زيت عافية زيت دوار الشمس 1.5لتر", price: 43050, category: "أخرى/متفرقات"},
    {name: "كندر اصبع 8 اصابع 100غ", price: 15000, category: "أخرى/متفرقات"},
    {name: "نستله كيت كات شانكي 38 غ", price: 4725, category: "أخرى/متفرقات"},
    {name: "نستله كيت كات اصبعين 17.7 غ", price: 4200, category: "أخرى/متفرقات"},
    {name: "اني هاي واي كيك 40 غ", price: 2310, category: "أخرى/متفرقات"},
    {name: "نستله سمارتيز 38 غ", price: 3150, category: "أخرى/متفرقات"},
    {name: "نستله سمارتيز ابيض 34 غ", price: 3675, category: "أخرى/متفرقات"},
  ];

  const cart = [];
  function displayProducts(filtered = products) {
    const container = document.getElementById('products');
    container.innerHTML = "";
    filtered.forEach(p => {
      container.innerHTML += `
        <div class="product" data-category="${p.category}">
          <img src="https://via.placeholder.com/200x150?text=${encodeURIComponent(p.name)}" alt="${p.name}">
          <h3>${p.name}</h3>
          <p>السعر: ${p.price.toLocaleString()} ل.س</p>
          <button onclick="addToCart('${p.name}', ${p.price})">أضف إلى السلة</button>
        </div>
      `;
    });
  }
  function filterProducts(category) {
    if (category === "all") {
      displayProducts();
    } else {
      displayProducts(products.filter(p => p.category === category));
    }
  }

  function addToCart(name, price) {
    cart.push({name, price});
    updateCart();
  }

  function updateCart() {
    const cartItems = document.getElementById("cartItems");
    const total = cart.reduce((sum, item) => sum + item.price, 0);
    cartItems.innerHTML = cart.map(i => `<div>• ${i.name} - ${i.price.toLocaleString()} ل.س</div>`).join("");
    document.getElementById("totalPrice").textContent = total.toLocaleString();
  }

  function sendOrder() {
    if (cart.length === 0) {
      alert("السلة فارغة!");
      return;
    }

    let order = cart.map(i => `• ${i.name} - ${i.price.toLocaleString()} ل.س`).join("\n");
    order += `\nالإجمالي: ${cart.reduce((sum, i) => sum + i.price, 0).toLocaleString()} ل.س`;

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        const {latitude, longitude} = pos.coords;
        const locLink = `https://maps.google.com/?q=${latitude},${longitude}`;
        order += `\nموقع الزبون: ${locLink}`;
        const url = `https://wa.me/963983012001?text=${encodeURIComponent(order)}`;
        window.open(url, "_blank");
      }, () => {
        const url = `https://wa.me/963983012001?text=${encodeURIComponent(order)}`;
        window.open(url, "_blank");
      });
    } else {
      const url = `https://wa.me/963983012001?text=${encodeURIComponent(order)}`;
      window.open(url, "_blank");
    }
  }

  displayProducts(); // أول تحميل للصفحة
</script>

</body>
</html>
